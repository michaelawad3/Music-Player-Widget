<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Music Player Widget</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div class = "track-info">
      <div class="title-wrapper">
        <div class="scrolling-text">
          <h1 id ="song-title"></h1>
        </div>
        </div>
        <h2 id = "artists"> </h2>
      </div>
    </div>

    <img id="album-cover" src="images/default.png" alt="Album Cover" />

    <!-- <div class="volume-container">
      <button id="volume-button">
        <img src="images/volume.png" alt="Volume" />
      </button>
      <input type="range" id="volume-slider" min="0" max="100" value="50" />
    </div> -->

    <!-- <div>
      <button id = "save">save</button>
    </div> -->

    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>    
    
    <div class="controls">
      <button id = "previous"><img src="images/previous.png" alt="previous" /></button>
      <button id = "play"><img src="images/pause.png" alt="pause" /></button>
      <button id = "next"><img src="images/next.png" alt="next" /></button>
    </div>
    
    <script src="spotify.js"></script>
  </body>
</html>
